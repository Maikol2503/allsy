<div class="category-box" (click)="abrirCategorias()">
  <span style="flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
    {{ getNombreCategoriaSeleccionada() }}
  </span>
  
  <span class="clear-btn" *ngIf="rutaCategorias.length > 0" (click)="limpiarSeleccion($event)" style="cursor: pointer; padding: 0 5px;">✖</span>
  
  <span class="arrow" *ngIf="rutaCategorias.length === 0" [class.open]="dropdownAbierto">▼</span>
</div>

<div class="category-dropdown" *ngIf="dropdownAbierto">
  <div class="category-back" *ngIf="rutaCategorias.length > 0" (click)="volverCategoria()">
    ⬅ Volver
  </div>
  
  <div class="category-item option-select-all" 
       *ngIf="permitirSeleccionarTodo && getCategoriaNavegacion()" 
       (click)="confirmarSeleccionTodo()">
    <span class="category-name" style="color: var(--ap-color-success, var(--ap-color-success)); font-weight: bold;">
      ✓ Todo en {{ getCategoriaNavegacion()?.nombre }}
    </span>
  </div>

  <div class="category-item" *ngFor="let c of categoriaActual" (click)="seleccionarCategoria(c)">
    <span class="category-name">{{ c.nombre }}</span>
    <span class="sub-arrow" *ngIf="tieneHijos(c)">▶</span>
  </div>
</div>
